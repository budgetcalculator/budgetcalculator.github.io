<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — BudgetCalc</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <style>
    .legal-content { padding: 120px 0 80px; }
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; background: var(--white); padding: 40px; border-radius: var(--radius-lg); box-shadow: var(--shadow); border: 1px solid var(--gray-100); }
    .contact-info h1 { font-family: var(--font-display); font-size: 2.5rem; margin-bottom: 1rem; }
    .contact-method { margin-top: 2rem; }
    .contact-link { color: var(--blue-600); font-weight: 600; text-decoration: none; font-size: 1.1rem; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--gray-700); }
    .form-control { width: 100%; padding: 12px; border: 1px solid var(--gray-200); border-radius: 8px; font-family: inherit; }
    @media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="legal-content">
    <div class="container">
      <div class="contact-grid">
        <div class="contact-info">
          <span class="section-eyebrow">Get in Touch</span>
          <h1>Have a question or feedback?</h1>
          <p>Whether you've found a bug, have a feature suggestion, or just want to say hi, I'd love to hear from you.</p>
          
          <div class="contact-method">
            <p><strong>Email Me Directly:</strong></p>
            <a href="mailto:nolushac@gmail.com" class="contact-link">nolushac@gmail.com</a>
          </div>
        </div>

        <div class="contact-form">
          <form action="https://formspree.io/f/nolushac@gmail.com" method="POST">
            <div class="form-group">
              <label>Name</label>
              <input type="text" name="name" class="form-control" placeholder="Your Name" required>
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
              <label>Message</label>
              <textarea name="message" class="form-control" rows="5" placeholder="How can I help?" required></textarea>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="components/header.js"></script>
  <script src="components/footer.js"></script>
</body>
</html>
